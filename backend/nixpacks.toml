[phases.build]
cmds = ["pip install -r requirements.txt"]

[phases.deploy]
cmds = ["flask db upgrade"]

[start]
cmd = "gunicorn -w 2 -b 0.0.0.0:$PORT 'app:create_app()'"
```

Also create `backend/runtime.txt` to explicitly tell it the Python version:
```
python-3.11.9
```

Then push:
```
git add .
git commit -m "add nixpacks config"
git push